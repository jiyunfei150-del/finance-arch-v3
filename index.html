* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f8fafc;
  -webkit-font-smoothing: antialiased;
}
.page {
  max-width: 1500px;
  margin: 0 auto;
  padding: 28px 32px 40px;
  background: #fff;
  min-height: 100vh;
}
header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 2px solid #e2e8f0;
  padding-bottom: 16px;
  margin-bottom: 24px;
}
h1 { font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: -0.3px; }
.sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
.sub span+span::before { content: ' · '; }
.btn-print {
  border: 1px solid #cbd5e1; background: #fff; color: #64748b;
  border-radius: 5px; padding: 6px 14px; font-size: 12px;
  font-weight: 500; cursor: pointer; font-family: inherit;
}
.btn-print:hover { background: #f8fafc; }
.canvas-wrap {
  width: 100%;
  overflow-x: auto;
}
svg {
  display: block;
  font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
footer {
  margin-top: 20px; padding-top: 14px;
  border-top: 1px solid #e2e8f0;
  display: flex; justify-content: space-between;
  align-items: center; font-size: 11px; color: #94a3b8;
}
.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  background: #fff; border: 1px solid #e2e8f0;
  border-radius: 3px; padding: 2px 8px;
  color: #475569; font-size: 11px; font-weight: 500;
}
@media print {
  @page { size: A3 landscape; margin: 10mm; }
  body { background: white; }
  .page { padding: 0; max-width: none; }
  .btn-print { display: none; }
}
</style>
