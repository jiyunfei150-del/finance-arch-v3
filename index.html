<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;

}
.page {
  width: 1400px;
  margin: 20px auto;
  padding: 28px 32px 36px;
  background: #fff;
}
header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 2px solid #e2e8f0;
  padding-bottom: 14px;
  margin-bottom: 20px;
}
h1 { font-size: 20px; font-weight: 800; color: #0f172a; }
.sub { font-size: 11px; color: #94a3b8; margin-top: 3px; }
.sub span+span::before { content: ' · '; }
.btn-print {
  border: 1px solid #cbd5e1; background: #fff; color: #64748b;
  border-radius: 5px; padding: 5px 12px; font-size: 11px;
  font-weight: 500; cursor: pointer; font-family: inherit;
}
.legend-row { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #64748b; }
.leg-line { width: 36px; height: 0; display: inline-block; flex-shrink: 0; }
.leg-solid  { border-top: 2px solid #334155; }
.leg-dashed { border-top: 2px dashed #94a3b8; }
.leg-dotted { border-top: 2px dotted #94a3b8; }
footer {
  margin-top: 16px; padding-top: 12px;
  border-top: 1px solid #e2e8f0;
  display: flex; justify-content: space-between;
  font-size: 11px; color: #94a3b8;
}
.chips { display: flex; gap: 6px; }
.chip { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 3px; padding: 2px 8px; font-size: 10px; color: #64748b; }
@media print {
  @page { size: A3 landscape; margin: 8mm; }
  body { background: white; }
  .page { margin: 0; }
  .btn-print { display: none; }
}
</style>
